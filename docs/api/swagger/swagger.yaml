host: localhost:8080
info:
  contact:
    email: support@anychat.example.com
    name: AnyChat API Support
    url: https://github.com/yzhgit/anychat-server
  description: |-
    AnyChat instant messaging system gateway API service, providing HTTP interfaces for user authentication, user management, and other functions.
    All endpoints requiring authentication must include Authorization: Bearer <token> in the Header.
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  title: AnyChat Gateway API
  version: "1.0"
paths:
  /admin/admins:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: success
          schema:
            allOf:
            - $ref: '#/definitions/github_com_anychat_server_pkg_response.Response'
            - properties:
                data:
                  type: object
              type: object
      security:
      - BearerAuth: []
      summary: admin list
      tags:
      - admin-admin-management
    post:
      consumes:
      - application/json
      parameters:
      - description: admin info
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handler.createAdminRequest'
      produces:
      - application/json
      responses:
        "200":
          description: success
          schema:
            $ref: '#/definitions/github_com_anychat_server_pkg_response.Response'
      security:
      - BearerAuth: []
      summary: create admin
      tags:
      - admin-admin-management
  /admin/admins/{adminId}/status:
    put:
      consumes:
      - application/json
      parameters:
      - description: admin ID
        in: path
        name: adminId
        required: true
        type: string
      - description: status
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handler.updateAdminStatusRequest'
      produces:
      - application/json
      responses:
        "200":
          description: success
          schema:
            $ref: '#/definitions/github_com_anychat_server_pkg_response.Response'
      security:
      - BearerAuth: []
      summary: update admin status
      tags:
      - admin-admin-management
  /admin/audit-logs:
    get:
      parameters:
      - description: admin ID filter
        in: query
        name: adminId
        type: string
      - description: action filter
        in: query
